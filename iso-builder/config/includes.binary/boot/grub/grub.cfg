set default=0
set timeout=10
set timeout_style=menu

terminal_output console

set menu_color_normal=white/black
set menu_color_highlight=black/light-gray

menuentry "Boot LinuxTV Live" {
    linux /live/vmlinuz boot=live components quiet splash
    initrd /live/initrd.img
}

menuentry "Install LinuxTV" {
    linux /install/vmlinuz auto=true priority=critical file=/cdrom/preseed/linuxtv.cfg vga=788 --- quiet
    initrd /install/initrd.gz
}

submenu "Advanced Options" {
    menuentry "Boot LinuxTV Live (fail-safe)" {
        linux /live/vmlinuz boot=live components memtest noapic noapm nodma nomce nosmp nosplash vga=788
        initrd /live/initrd.img
    }

    menuentry "Expert Install LinuxTV" {
        linux /install/vmlinuz priority=low file=/cdrom/preseed/linuxtv.cfg vga=788
        initrd /install/initrd.gz
    }

    menuentry "Rescue Mode" {
        linux /install/vmlinuz rescue/enable=true file=/cdrom/preseed/linuxtv.cfg vga=788 --- quiet
        initrd /install/initrd.gz
    }

    if [ "${grub_platform}" = "efi" ]; then
        menuentry "UEFI Firmware Settings" {
            fwsetup
        }
    fi
}
