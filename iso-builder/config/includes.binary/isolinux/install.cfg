label installstart
    menu label ^Install LinuxTV
    linux /install/vmlinuz
    initrd /install/initrd.gz
    append preseed/file=/cdrom/preseed/linuxtv.cfg vga=788 --- quiet

menu begin install
    menu label ^Advanced install options
    menu title Advanced install options
    include stdmenu.cfg
    label mainmenu
        menu label ^Back..
        menu exit

    label install
        menu label ^Install LinuxTV
        linux /install/vmlinuz
        initrd /install/initrd.gz
        append preseed/file=/cdrom/preseed/linuxtv.cfg vga=788 --- quiet

    label expert
        menu label E^xpert install
        linux /install/vmlinuz
        initrd /install/initrd.gz
        append priority=low preseed/file=/cdrom/preseed/linuxtv.cfg vga=788

    label rescue
        menu label ^Rescue mode
        linux /install/vmlinuz
        initrd /install/initrd.gz
        append rescue/enable=true preseed/file=/cdrom/preseed/linuxtv.cfg vga=788 --- quiet
menu end
