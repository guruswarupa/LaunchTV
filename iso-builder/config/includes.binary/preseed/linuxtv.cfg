d-i debian-installer/locale string en_US.UTF-8
d-i localechooser/supported-locales multiselect en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us
d-i console-setup/ask_detect boolean false

d-i netcfg/enable boolean false
d-i netcfg/get_hostname string linuxtv
d-i netcfg/get_domain string local
d-i hw-detect/load_firmware boolean true

d-i apt-setup/use_mirror boolean false
d-i apt-setup/cdrom/set-first boolean true

d-i clock-setup/utc boolean true
d-i time/zone string Etc/UTC
d-i clock-setup/ntp boolean true

d-i passwd/root-login boolean false
d-i passwd/make-user boolean true
d-i passwd/user-fullname string LinuxTV
d-i passwd/username string linuxtv
d-i passwd/user-password password linuxtvbyguru
d-i passwd/user-password-again password linuxtvbyguru
d-i passwd/user-default-groups string audio cdrom video sudo dip plugdev netdev input

d-i apt-setup/non-free boolean true
d-i apt-setup/contrib boolean true
d-i apt-setup/non-free-firmware boolean true

d-i pkgsel/include string openssh-server
d-i pkgsel/upgrade select none
popularity-contest popularity-contest/participate boolean false

d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true

d-i finish-install/reboot_in_progress note

d-i preseed/late_command string \
    in-target /bin/sh -c "if grep -q '^GRUB_CMDLINE_LINUX_DEFAULT=' /etc/default/grub; then sed -i 's/^GRUB_CMDLINE_LINUX_DEFAULT=.*/GRUB_CMDLINE_LINUX_DEFAULT=\"quiet splash\"/' /etc/default/grub; else echo 'GRUB_CMDLINE_LINUX_DEFAULT=\"quiet splash\"' >> /etc/default/grub; fi"; \
    in-target plymouth-set-default-theme linuxtv; \
    in-target update-initramfs -u; \
    in-target update-grub
