d-i passwd/root-login boolean false
d-i passwd/make-user boolean true
d-i passwd/user-fullname string LinuxTV
d-i passwd/username string linuxtv
d-i passwd/user-password password linuxtvbyguru
d-i passwd/user-password-again password linuxtvbyguru
d-i user-setup/allow-password-weak boolean true
d-i preseed/late_command string mkdir -p /target/usr/local/sbin; cp /cdrom/install-post.sh /target/usr/local/sbin/linuxtv-post-install; chmod +x /target/usr/local/sbin/linuxtv-post-install; in-target /usr/local/sbin/linuxtv-post-install
